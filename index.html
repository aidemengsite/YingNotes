<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YingNotes | 个人笔记</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <style>
        :root {
            /* 强制明亮配色方案 */
            --sidebar-bg: #ffffff; 
            --sidebar-hover: #f0f2f5;
            --accent-color: #007bff;
            --text-main: #2c3e50;
            --text-muted: #6c757d;
            --border-color: #eaecef;
        }

        body { 
            display: flex; 
            margin: 0; 
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; 
            height: 100vh; 
            background-color: #fff;
            color: var(--text-main);
        }

        /* --- 左侧菜单栏 --- */
        #sidebar { 
            width: 300px; 
            background: var(--sidebar-bg) !important; /* 使用 important 确保覆盖 */
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        .logo { 
            padding: 30px 25px; 
            font-size: 1.4rem; 
            font-weight: 800; 
            color: var(--accent-color); 
            letter-spacing: 1px;
        }

        /* 文件夹标题：增加上下间距 */
        .folder-header { 
            padding: 15px 25px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            font-weight: 600;
            user-select: none;
            transition: all 0.2s;
            border-radius: 8px;
            margin: 2px 10px;
        }
        .folder-header:hover { background: var(--sidebar-hover); }
        
        /* 箭头符号 */
        .arrow { 
            display: inline-block;
            margin-right: 10px; 
            transition: transform 0.3s; 
            font-size: 0.7em;
            color: var(--text-muted);
        }
        /* 当父级有 .collapsed 类时，旋转箭头并隐藏子菜单 */
        .collapsed .arrow { transform: rotate(-90deg); }

        /* 子菜单容器：核心折叠逻辑 */
        .submenu { 
            display: block; /* 默认展开 */
        }
        .collapsed + .submenu { 
            display: none; /* 隐藏 */
        }

        /* 文件链接：增加上下间距 */
        .file-link { 
            padding: 12px 25px 12px 55px; 
            cursor: pointer; 
            font-size: 0.95em; 
            color: var(--text-muted);
            display: block;
            margin: 2px 10px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .file-link:hover { background: var(--sidebar-hover); color: var(--accent-color); }
        .file-link.active { 
            background: #eef6ff; 
            color: var(--accent-color); 
            font-weight: 600;
        }

        /* --- 右侧内容区 --- */
        #content { 
            flex: 1; 
            padding: 10px; 
            overflow-y: auto; 
            background: #fff;
        }
        #markdown-body { 
            /* max-width: 850px;  */
            /* margin: 0 auto;  */
            /* line-height: 1; */
            font-size: 1.1rem;
        }
        
        /* Markdown 里的列表和段落间距 */
        #markdown-body p, #markdown-body li { margin-bottom: 1.5em; }
        #markdown-body h1, #markdown-body h2 { margin-top: 2em; padding-bottom: 0.5em; border-bottom: 1px solid var(--border-color); }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="logo">YINGNOTES</div>
    
    <div class="menu-group">
        <div class="folder-header" onclick="toggleFolder(this)">
            <span class="arrow">▼</span> 📂 englishnote
        </div>
        <div class="submenu">
            
            <div class="folder-header" style="padding-left: 40px;" onclick="toggleFolder(this)">
                <span class="arrow">▼</span> 📁 grammar
            </div>
            <div class="submenu">
                <div class="file-link" onclick="loadDoc('englishnote/grammar/n2.md', this)">📄 n2.md</div>
            </div>

            <div class="folder-header" style="padding-left: 40px;" onclick="toggleFolder(this)">
                <span class="arrow">▼</span> 📁 speech
            </div>
            <div class="submenu">
                <div class="file-link" onclick="loadDoc('englishnote/speech/n1.md', this)">📄 n1.md</div>
            </div>

        </div>
    </div>

    <div class="logo">Opencv</div>
    <div class="menu-group">
        <div class="folder-header" onclick="toggleFolder(this)">
            <span class="arrow">▼</span> 📂 opencv1
        </div>
        <div class="submenu">
            
            <div class="folder-header" style="padding-left: 40px;" onclick="toggleFolder(this)">
                <span class="arrow">▼</span> 📁 opencv2
            </div>
            <div class="submenu">
                <div class="file-link" onclick="loadDoc('opencv/n1.md', this)">📄 n2.md</div>
            </div>

        </div>
    </div>

</div>

<div id="content">
    <article id="markdown-body" class="markdown-body">
        <h1>请选择笔记</h1>
        <p>从左侧目录中点击对应的文件进行查看。</p>
    </article>
</div>

<script>
    // 改进后的折叠功能：点击标题，给标题本身切换 'collapsed' 类
    function toggleFolder(element) {
        element.classList.toggle('collapsed');
    }

    async function loadDoc(filePath, element) {
        // 防止点击文件夹标题时触发加载（本代码已分离，此为保险）
        event.stopPropagation();

        document.querySelectorAll('.file-link').forEach(el => el.classList.remove('active'));
        element.classList.add('active');

        const contentDiv = document.getElementById('markdown-body');
        contentDiv.innerHTML = "<p style='color: #999;'>加载中...</p>";
        
        try {
            const response = await fetch(filePath);
            if (!response.ok) throw new Error('文件加载失败');
            const text = await response.text();
            contentDiv.innerHTML = marked.parse(text);

            // --- 新增：手动触发代码高亮 ---
            // Prism.highlightAllUnder(contentDiv);
        } catch (err) {
            contentDiv.innerHTML = `<p style="color:red">错误: ${err.message}</p>`;
        }
    }
</script>

</body>
</html>
